[project]
name = "trendmaster"
version = "0.1.0"
description = "TrendMaster: Integrity service + ETL/data processing toolkit"
requires-python = ">=3.10"

dependencies = [
    "PySide6",
    "python-dotenv",
    "yarl",
    "SQLAlchemy",
    "pandas",
    "requests",
    "qrcode",
    "psutil",
    "structlog",
]

[tool.setuptools.packages.find]
where = ["IntegrityService"]
include = ["integrity_service*", "src*"]

[project.scripts]
trendmaster-gui = "integrity_service.gui.app:main"